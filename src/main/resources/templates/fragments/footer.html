<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div th:fragment="footer">

    <style>

        .footer{
            background:#2f2f2f;
            color:white;
            padding:40px 8%;
            margin-top:50px;
        }

        .footer-container{
            display:flex;
            justify-content:space-between;
            gap:40px;
            flex-wrap:wrap;
        }

        .footer-info{
            flex:1;
            min-width:300px;
        }

        .footer-info h3{
            color:#ff69b4;
            margin-bottom:20px;
            font-size:28px;
        }

        .footer-info p{
            margin-bottom:12px;
            line-height:1.7;
            color:#ddd;
        }

        .footer-map{
            flex:1;
            min-width:320px;
        }

        .footer-map iframe{
            width:100%;
            height:260px;
            border:none;
            border-radius:12px;
        }

        .footer-bottom{
            text-align:center;
            margin-top:30px;
            padding-top:20px;
            border-top:1px solid rgba(255,255,255,0.15);
            color:#bbb;
        }

        @media(max-width:768px){

            .footer-container{
                flex-direction:column;
            }

        }

    </style>

    <div class="footer">

        <div class="footer-container">

            <div class="footer-info">

                <h3>🌸 Shop Hoa Thúy Hằng</h3>

                <p>
                    📍 Địa chỉ:
                    20 Tăng Nhơn Phú,
                    Phường Phước Long B,
                    Quận 9,
                    TP. Hồ Chí Minh
                </p>

                <p>📞 Hotline: 0708 592 543</p>

                <p>✉️ Email: nguyenthuyhang19103@gmail.com</p>

                <p>
                    ⏰ Giờ mở cửa:
                    07:00 - 21:00 mỗi ngày
                </p>

            </div>

            <div class="footer-map">

                <iframe
                    src="https://www.google.com/maps?q=20%20Tang%20Nhon%20Phu%20Phuoc%20Long%20B%20Quan%209%20Ho%20Chi%20Minh&output=embed"
                    loading="lazy"
                    allowfullscreen>
                </iframe>

            </div>

        </div>

        <div class="footer-bottom">
            © 2026 Shop Hoa Thúy Hằng - Hoa tươi mỗi ngày 🌷
        </div>

    </div>

</div>

</body>
</html>
