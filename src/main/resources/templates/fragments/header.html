<header th:fragment="header">

<style>

.header{
    position:sticky;
    top:0;
    z-index:50;
    background:rgba(255, 245, 247, 0.92);
    color:#3c2227;
    box-shadow:0 12px 28px rgba(111, 75, 83, 0.12);
    backdrop-filter:blur(14px);
    border-bottom:1px solid rgba(232, 93, 117, 0.1);
}

.header-top{
    width:min(1280px, calc(100% - 24px));
    min-height:82px;
    margin:0 auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:Georgia, "Times New Roman", serif;
    font-size:28px;
    font-weight:700;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:#4a252d;
}

.logo::before{
    content:"";
    width:14px;
    height:14px;
    border-radius:50%;
    background:linear-gradient(135deg, #ffcf70, #e85d75);
    box-shadow:0 0 0 6px rgba(232, 93, 117, 0.14);
}

.menu{
    display:flex;
    align-items:center;
    gap:12px;
    flex-wrap:wrap;
    justify-content:flex-end;
}

.menu > a{
    color:#5a343d;
    text-decoration:none;
    font-size:16px;
    font-weight:600;
    padding:10px 12px;
    border-radius:999px;
    transition:0.2s ease;
}

.menu > a:hover{
    background:rgba(232, 93, 117, 0.08);
    transform:translateY(-1px);
}

.guest-box,
.user-box{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

.login-btn,
.register-btn,
.logout-btn,
.user-btn,
.cart-btn,
.order-btn{
    text-decoration:none !important;
    font-weight:700;
    padding:11px 16px;
    border-radius:999px;
    transition:0.2s ease;
}

.login-btn{
    background:rgba(232, 93, 117, 0.08);
    color:#d94c67 !important;
    border:1px solid rgba(232, 93, 117, 0.12);
}

.register-btn{
    background:linear-gradient(135deg, #ffb84d, #ff9f43);
    color:#3b2208 !important;
    box-shadow:0 8px 18px rgba(255, 159, 67, 0.22);
}

.user-btn{
    background:rgba(232, 93, 117, 0.08);
    color:#d94c67 !important;
    border:1px solid rgba(232, 93, 117, 0.12);
}

.order-btn{
    background:linear-gradient(135deg, #7d74ff, #5d67ff);
    color:white !important;
}

.cart-btn{
    background:linear-gradient(135deg, #2f9e44, #1f8d37);
    color:white !important;
}

.logout-btn{
    background:linear-gradient(135deg, #e03131, #bf2a2a);
    color:white !important;
}

.login-btn:hover,
.register-btn:hover,
.logout-btn:hover,
.user-btn:hover,
.cart-btn:hover,
.order-btn:hover{
    transform:translateY(-2px);
}

@media (max-width: 992px){
    .header-top{
        min-height:auto;
        padding:14px 0;
        flex-direction:column;
        align-items:flex-start;
    }

    .menu{
        justify-content:flex-start;
    }
}

</style>

<div class="header">
    <div class="header-top">
        <div class="logo">Shop Hoa Thúy Hằng</div>

        <div class="menu">
            <a href="/">Trang chủ</a>

            <div th:if="${session.user == null}" class="guest-box">
                <a href="/login" class="login-btn">Đăng nhập</a>
                <a href="/register" class="register-btn">Đăng ký</a>
            </div>

            <div th:if="${session.user != null}" class="user-box">
                <a href="/profile" class="user-btn">
                    <span th:text="${session.user.fullName}"></span>
                </a>

                <a th:if="${session.user.role == 'ADMIN'}"
                   href="/admin"
                   class="order-btn">
                    Quản trị
                </a>

                <a href="/logout" class="logout-btn">Đăng xuất</a>
            </div>
        </div>
    </div>
</div>

</header>
