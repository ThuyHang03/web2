<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Quản trị sản phẩm</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    width:90%;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h1{
    color:#ff69b4;
    margin-bottom:20px;
}

.add-btn{
    display:inline-block;
    margin-bottom:20px;
    background:#28a745;
    color:white;
    padding:12px 18px;
    text-decoration:none;
    border-radius:8px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#ff69b4;
    color:white;
}

img{
    width:100px;
    height:100px;
    object-fit:cover;
}

.edit-btn{
    background:#2196f3;
    color:white;
    padding:8px 12px;
    border-radius:5px;
    text-decoration:none;
}

.delete-btn{
    background:#f44336;
    color:white;
    padding:8px 12px;
    border-radius:5px;
    text-decoration:none;
}

</style>

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">

    <h1>⚙️ Quản lý sản phẩm</h1>

    <a href="/admin/products/add"
       class="add-btn">
        ➕ Thêm sản phẩm
    </a>

    <table>

        <tr>
            <th>ID</th>
            <th>Ảnh</th>
            <th>Tên</th>
            <th>Giá</th>
            <th>Giảm giá</th>
            <th>Thao tác</th>
        </tr>

        <tr th:each="p : ${products}">

    <td th:text="${p.id}"></td>

    <td>
        <img th:src="@{'/images/' + ${p.image}}">
    </td>

    <td th:text="${p.name}"></td>

    <td th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>

<td>

    <span th:if="${p.discountPercent != null && p.discountPercent > 0}"
          th:text="${p.discountPercent + '%'}"
          style="
            background:red;
            color:white;
            padding:4px 8px;
            border-radius:5px;">
    </span>

    <span th:if="${p.discountPercent == null || p.discountPercent == 0}">
        Không giảm
    </span>

</td>

<td th:text="${p.category != null ? p.category.name : 'Chưa phân loại'}"></td>

    <td th:text="${p.discountPercent != null ? p.discountPercent + '%' : '0%'}"></td>

    <td>
        <a class="btn edit"
           th:href="@{/admin/edit/{id}(id=${p.id})}">
            Sửa
        </a>
    </td>

    <td>
        <a class="btn delete"
           th:href="@{/admin/delete/{id}(id=${p.id})}"
           onclick="return confirm('Bạn có chắc muốn xóa?')">
            Xóa
        </a>
    </td>

</tr>

    </table>

</div>

</body>
</html>
