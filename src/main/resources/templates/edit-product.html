<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sửa sản phẩm</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
        }

        .box{
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2{
            text-align: center;
            margin-bottom: 25px;
        }

        label{
            font-weight: bold;
        }

        input,
        textarea,
        select{
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        img{
            width: 150px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        button{
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }

        button:hover{
            background: #218838;
        }

    </style>

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="box">

    <h2>Sửa sản phẩm</h2>

    <form th:action="@{/admin/edit/{id}(id=${product.id})}"
      method="post"
      enctype="multipart/form-data">

        <label>Tên sản phẩm</label>

        <input type="text"
               name="name"
               th:value="${product.name}"
               required>

        <label>Giá</label>

        <input type="number"
               step="0.01"
               name="price"
               th:value="${product.price}"
               required>
               <label>Giảm giá (%)</label>

<input type="number"
       name="discountPercent"
       min="0"
       max="100"
       th:value="${product.discountPercent}">

        <label>Mô tả</label>

        <textarea name="description"
                  rows="5"
                  th:text="${product.description}">
        </textarea>

        <label>Danh mục</label>

        <select name="categoryId" required>

            <option
                    th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}"
                    th:selected="${product.category != null && product.category.id == category.id}">
            </option>

        </select>

        <label>Ảnh hiện tại</label>

        <img th:src="@{'/images/' + ${product.image}}"
             alt="Ảnh sản phẩm">

        <label>Chọn ảnh mới (không bắt buộc)</label>

        <input type="file"
               name="image"
               accept="image/*">

        <button type="submit">
            Lưu thay đổi
        </button>

    </form>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
