<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-cart">

<div th:replace="~{fragments/header :: header}"></div>

<main class="cart-shell">
    <section class="cart-card">
        <div class="section-heading">
            <div>
                <div class="section-kicker">Danh sách của bạn</div>
                <h1>Giỏ hàng</h1>
            </div>
            <a href="/" class="btn-ghost">Tiếp tục mua hàng</a>
        </div>

        <div class="cart-table-wrap" th:if="${cart != null && !cart.isEmpty()}">
            <table class="cart-table">
                <thead>
                <tr>
                    <th>Tên hoa</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                    <th>Thao tác</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cart}">
                    <td th:text="${item.product.name}"></td>
                    <td th:text="${#numbers.formatDecimal(item.product.price,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>
                    <td>
                        <div class="qty-control">
                            <a th:href="@{'/cart/decrease/' + ${item.product.id}}" aria-label="Giảm số lượng">−</a>
                            <span th:text="${item.quantity}"></span>
                            <a th:href="@{'/cart/increase/' + ${item.product.id}}" aria-label="Tăng số lượng">+</a>
                        </div>
                    </td>
                    <td th:text="${#numbers.formatDecimal(item.totalPrice,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>
                    <td>
                        <a th:href="@{'/cart/remove/' + ${item.product.id}}" class="cart-link danger">
                            Xóa
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-state" th:if="${cart == null || cart.isEmpty()}">
            Giỏ hàng của bạn đang trống. Hãy chọn vài bó hoa thật đẹp nhé.
        </div>

        <div class="cart-summary">
            <div class="total-box">
                <span>Tổng tiền</span>
                <strong th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + ' VNĐ'"></strong>
            </div>

            <div class="cart-actions">
                <a href="/my-orders" class="btn-secondary">
                    Đơn hàng (<span th:text="${orderCount} ?: 0"></span>)
                </a>
                <a href="/checkout" class="btn-primary">
                    Thanh toán
                </a>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
