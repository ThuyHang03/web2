<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Giỏ hàng</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    width:900px;
    margin:auto;
    background:white;
    padding:20px;
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#ff69b4;
    color:white;
}

.total{
    margin-top:20px;
    font-size:24px;
    color:red;
    font-weight:bold;
}

.btn{
    display:inline-block;
    margin-top:20px;
    background:#28a745;
    color:white;
    padding:10px 15px;
    text-decoration:none;
}

</style>

</head>
<body>
<body>

<div th:replace="~{fragments/header :: header}"></div>
<div class="container">

<h1>🛒 Giỏ hàng</h1>

<table>

<tr>
    <th>Tên hoa</th>
    <th>Giá</th>
    <th>Số lượng</th>
    <th>Thành tiền</th>
    <th>Thao tác</th>
</tr>

<tr th:each="item : ${cart}">

    <td th:text="${item.product.name}"></td>

    <td th:text="${item.product.price} + ' VNĐ'"></td>

    <td>

        <a th:href="@{'/cart/decrease/' + ${item.product.id}}">
            ➖
        </a>

        <span th:text="${item.quantity}"></span>

        <a th:href="@{'/cart/increase/' + ${item.product.id}}">
            ➕
        </a>

    </td>

    <td th:text="${item.totalPrice} + ' VNĐ'"></td>

    <td>

        <a th:href="@{'/cart/remove/' + ${item.product.id}}">
            ❌ Xóa
        </a>

    </td>

</tr>
</table>

<div class="total">
    Tổng tiền:
    <span th:text="${total}"></span>
    VNĐ
    <link rel="stylesheet" th:href="@{/css/style.css}">
</div>

<div style="margin-top:20px;">

    <a href="/"
       class="btn"
       style="background:#28a745;">
        🛍️ Tiếp tục mua hàng
    </a>

    <a href="/checkout"
       class="btn"
       style="background:#ff69b4;">
        💳 Thanh toán
    </a>
    <a href="/my-orders"
   class="order-btn">
    📦 Đơn hàng
    (<span th:text="${orderCount} ?: 0"></span>)
</a>

</div>

</div>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
