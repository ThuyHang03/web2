<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}

.box{
    width:450px;
    margin:50px auto;
    background:white;
    padding:30px;
    border-radius:10px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
}

button{
    background:#ff69b4;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
}

.error{
    color:red;
}

</style>

</head>
<body>

<div class="box">

<h2>Đăng ký tài khoản</h2>

<p class="error" th:text="${error}"></p>

<form action="/register" method="post">

<input type="text"
       name="fullName"
       placeholder="Họ và tên"
       required>

<input type="text"
       name="username"
       placeholder="Tên đăng nhập"
       required>

<input type="password"
       name="password"
       placeholder="Mật khẩu"
       required>

<button type="submit">
    Đăng ký
</button>

</form>

<br>

<a href="/login">
    Đã có tài khoản? Đăng nhập
</a>

</div>

</body>
</html>
