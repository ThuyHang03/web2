<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>

<meta charset="UTF-8">
<title>Quản lý đơn hàng</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

.wrapper{
    display:flex;
    min-height:100vh;
}

/* Sidebar */

.sidebar{

    width:240px;
    background:#2c3e50;
    color:white;

}

.logo{

    padding:25px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    border-bottom:1px solid rgba(255,255,255,.1);

}

.sidebar a{

    display:block;
    color:white;
    text-decoration:none;
    padding:18px 25px;
    transition:.3s;

}

.sidebar a:hover{

    background:#34495e;

}

.active{

    background:#34495e;

}

/* Content */

.content{

    flex:1;
    padding:30px;

}

h1{

    color:#333;
    margin-bottom:10px;

}

.info{

    color:#666;
    margin-bottom:20px;

}

table{

    width:100%;
    border-collapse:collapse;
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.08);

}

th{

    background:#ff69b4;
    color:white;
    padding:15px;

}

td{

    padding:15px;
    text-align:center;
    border-bottom:1px solid #eee;

}

tr:hover{

    background:#fafafa;

}

.payment{
    background:#28a745;
    color:white;
    padding:5px 12px;
    border-radius:20px;
}
.cancel{
    background:#dc3545;
    color:white;
    padding:5px 12px;
    border-radius:20px;
}
.wait{

    background:#ffc107;
    color:black;
    padding:5px 12px;
    border-radius:20px;

}

.view-btn{

    background:#007bff;
    color:white;
    padding:8px 15px;
    border-radius:6px;
    text-decoration:none;

}

.view-btn:hover{

    background:#0069d9;

}

</style>

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            🌸 FLOWER SHOP
        </div>

        <a href="/admin">
            🏠 Dashboard
        </a>

        <a href="/admin/products">
            🌷 Quản lý sản phẩm
        </a>

        <a href="/admin/users">
            👤 Quản lý khách hàng
        </a>

        <a href="/admin/orders" class="active">
            📦 Quản lý đơn hàng
        </a>

    </div>

    <!-- Content -->

    <div class="content">

        <h1>📦 Quản lý đơn hàng</h1>

        <p class="info">
            Tổng đơn hàng:
            <b th:text="${orders.size()}"></b>
        </p>

        <table>

            <tr>
    <th>Mã đơn</th>
    <th>Khách hàng</th>
    <th>SĐT</th>
    <th>Tổng tiền</th>
    <th>Ngày mua</th>
    <th>Trạng thái</th>
    <th>Chi tiết</th>
    <th>Thao tác</th>
</tr>

            <tr th:each="order : ${orders}">

    <td th:text="${order.id}"></td>

    <td th:text="${order.customerName}"></td>

    <td th:text="${order.phone}"></td>

    <td th:text="${#numbers.formatDecimal(order.total,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>

    <td th:text="${#temporals.format(order.orderDate,'dd/MM/yyyy HH:mm')}"></td>

    <td>

        <span
            th:text="${order.status}"
            th:classappend="${
                order.status=='Đã xác nhận'
                ? 'payment'
                : (order.status=='Đã hủy'
                    ? 'cancel'
                    : 'wait')
            }">
        </span>

    </td>

    <td>

        <a class="view-btn"
           th:href="@{/admin/orders/{id}(id=${order.id})}">
            Xem
        </a>

    </td>

    <td>

        <form th:action="@{/admin/orders/confirm/{id}(id=${order.id})}"
              method="post"
              style="display:inline;">

            <button type="submit">
                ✔ Xác nhận
            </button>

        </form>

        <form th:action="@{/admin/orders/cancel/{id}(id=${order.id})}"
              method="post"
              style="display:inline;">

            <button type="submit">
                ✖ Hủy
            </button>

        </form>

    </td>

</tr>

        </table>

    </div>

</div>

</body>
</html>
