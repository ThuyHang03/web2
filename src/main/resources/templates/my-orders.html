<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Đơn hàng của tôi</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
}

.container{
    width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#ff69b4;
    color:white;
}

</style>

</head>
<body>

<div class="container">

<h1>📦 Đơn hàng của tôi</h1>

<table>

<tr>
    <th>Mã đơn</th>
    <th>Tên</th>
    <th>SĐT</th>
    <th>Tổng tiền</th>
    <th>Thanh toán</th>
</tr>

<tr th:each="o : ${orders}">

    <td th:text="${o.id}"></td>

    <td th:text="${o.customerName}"></td>

    <td th:text="${o.phone}"></td>

    <td th:text="${o.total}"></td>

    <td th:text="${o.paymentMethod}"></td>

</tr>

</table>

</div>

</body>
</html>
