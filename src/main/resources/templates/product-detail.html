<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-detail">

<div th:replace="~{fragments/header :: header}"></div>

<main class="detail-shell">
    <section class="detail-card">
        <div class="detail-media">
            <img th:src="@{'/images/' + ${product.image}}"
                 th:alt="${product.name}">
        </div>

        <div class="detail-info">
            <div class="detail-kicker">Sản phẩm nổi bật</div>
            <h1 th:text="${product.name}"></h1>

            <div class="detail-pricing" th:if="${product.discountPercent != null && product.discountPercent > 0}">
                <div class="detail-old-price">
                    <span th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')}"></span> VNĐ
                </div>
                <div class="detail-price">
                    <span th:text="${#numbers.formatDecimal(product.price * (100 - product.discountPercent) / 100,0,'COMMA',0,'POINT')}"></span> VNĐ
                </div>
                <span class="detail-discount">
                    Giảm <span th:text="${product.discountPercent}"></span>%
                </span>
            </div>

            <div class="detail-pricing" th:if="${product.discountPercent == null || product.discountPercent == 0}">
                <div class="detail-price"
                     th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + ' VNĐ'">
                </div>
            </div>

            <div class="detail-description" th:text="${product.description}"></div>

            <div class="detail-actions">
                <a th:href="@{'/cart/add/' + ${product.id}}" class="btn-primary">
                    Thêm vào giỏ hàng
                </a>
                <a href="/" class="btn-ghost">
                    Quay lại trang chủ
                </a>
            </div>

            <p class="detail-note" th:if="${param.success}">
                Đã thêm sản phẩm vào giỏ hàng.
            </p>
        </div>
    </section>
</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
