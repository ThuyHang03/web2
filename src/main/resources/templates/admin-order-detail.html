<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Chi tiết đơn hàng</title>

<style>

body{
    font-family: Arial;
    background:#f5f5f5;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

h2{
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#28a745;
    color:white;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

</style>

</head>
<body>

<div class="container">

    <h2>Chi tiết đơn hàng</h2>

    <table>

        <tr>
            <th>Sản phẩm</th>
            <th>Số lượng</th>
            <th>Giá</th>
            <th>Thành tiền</th>
        </tr>

        <tr th:each="item : ${items}">
            <td th:text="${item.productName}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${#numbers.formatDecimal(item.price,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>
            <td th:text="${#numbers.formatDecimal(item.price * item.quantity,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>
        </tr>

    </table>

    <a href="/admin/orders" class="btn">
        ← Quay lại
    </a>

</div>

</body>
</html>
