<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>

    <meta charset="UTF-8">
    <title>Quản lý khách hàng</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .wrapper{
            display:flex;
            min-height:100vh;
        }

        /* Sidebar */

        .sidebar{

            width:240px;
            background:#2c3e50;
            color:white;

        }

        .logo{

            padding:25px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
            border-bottom:1px solid rgba(255,255,255,.1);

        }

        .sidebar a{

            display:block;
            color:white;
            text-decoration:none;
            padding:18px 25px;
            transition:.3s;

        }

        .sidebar a:hover{

            background:#34495e;

        }

        .active{

            background:#34495e;

        }

        /* Content */

        .content{

            flex:1;
            padding:30px;

        }

        h1{

            margin-bottom:10px;
            color:#333;

        }

        .info{

            margin-bottom:20px;
            color:#666;

        }

        table{

            width:100%;
            background:white;
            border-collapse:collapse;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 5px 15px rgba(0,0,0,.08);

        }

        th{

            background:#ff69b4;
            color:white;
            padding:15px;

        }

        td{

            padding:15px;
            text-align:center;
            border-bottom:1px solid #eee;

        }

        tr:hover{

            background:#fafafa;

        }

        .role-admin{

            background:#28a745;
            color:white;
            padding:5px 10px;
            border-radius:20px;

        }

        .role-user{

            background:#6c757d;
            color:white;
            padding:5px 10px;
            border-radius:20px;

        }

        .delete-btn{

            background:#dc3545;
            color:white;
            text-decoration:none;
            padding:8px 14px;
            border-radius:6px;

        }

        .delete-btn:hover{

            background:#bb2d3b;

        }

    </style>

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <div class="sidebar">

        <div class="logo">
            🌸 FLOWER SHOP
        </div>

        <a href="/admin">
            🏠 Dashboard
        </a>

        <a href="/admin/products">
            🌷 Quản lý sản phẩm
        </a>

        <a href="/admin/users" class="active">
            👥 Quản lý khách hàng
        </a>

        <a href="/admin/orders">
            📦 Quản lý đơn hàng
        </a>

    </div>

    <!-- Content -->

    <div class="content">

        <h1>👥 Quản lý khách hàng</h1>

        <p class="info">
            Tổng khách hàng:
            <b th:text="${users.size()}"></b>
        </p>

        <table>

            <tr>

                <th>ID</th>
                <th>Họ tên</th>
                <th>Tài khoản</th>
                <th>Email</th>
                <th>Vai trò</th>
                <th>Thao tác</th>

            </tr>

            <tr th:each="u : ${users}">

                <td th:text="${u.id}"></td>

                <td th:text="${u.fullName}"></td>

                <td th:text="${u.username}"></td>

                <td th:text="${u.email}"></td>

                <td>

                    <span th:if="${u.role=='ADMIN'}"
                          class="role-admin">

                        ADMIN

                    </span>

                    <span th:if="${u.role!='ADMIN'}"
                          class="role-user">

                        USER

                    </span>

                </td>

                <td>

                    <a class="delete-btn"
                       th:href="@{/admin/users/delete/{id}(id=${u.id})}"
                       onclick="return confirm('Bạn có chắc muốn xóa khách hàng này?')">

                        Xóa

                    </a>

                </td>

            </tr>

        </table>

    </div>

</div>

</body>

</html>
