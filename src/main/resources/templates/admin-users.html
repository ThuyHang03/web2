<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Quản lý khách hàng</title>

<style>

body{
    font-family:Arial;
    background:#f5f5f5;
    padding:30px;
}

h1{
    color:#ff69b4;
}

table{
    width:100%;
    background:white;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

th{
    background:#ff69b4;
    color:white;
}

.btn-delete{
    background:red;
    color:white;
    padding:8px 12px;
    text-decoration:none;
    border-radius:5px;
}

.btn-back{
    display:inline-block;
    margin-top:20px;
    padding:10px 15px;
    background:#2196f3;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

</style>

</head>
<body>

<h1>👥 Quản lý khách hàng</h1>

<table>

<tr>
    <th>ID</th>
    <th>Họ tên</th>
    <th>Tài khoản</th>
    <th>Email</th>
    <th>Vai trò</th>
    <th>Thao tác</th>
</tr>

<tr th:each="u : ${users}">

    <td th:text="${u.id}"></td>

    <td th:text="${u.fullName}"></td>

    <td th:text="${u.username}"></td>

    <td th:text="${u.email}"></td>

    <td th:text="${u.role}"></td>

    <td>

        <a th:href="@{'/admin/user/delete/' + ${u.id}}"
           class="btn-delete"
           onclick="return confirm('Xóa khách hàng này?')">

            Xóa

        </a>

    </td>

</tr>

</table>

<a href="/admin" class="btn-back">
    ← Quay lại Admin
</a>

</body>
</html>
