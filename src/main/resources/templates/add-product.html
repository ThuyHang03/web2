<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Thêm sản phẩm</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            margin: 0;
            padding: 30px;
        }

        .container{
            width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        h1{
            text-align: center;
            color: #e91e63;
            margin-bottom: 25px;
        }

        label{
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        textarea,
        select{
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            box-sizing: border-box;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        textarea{
            resize: vertical;
            min-height: 100px;
        }

        button{
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #e91e63;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
            border-radius: 5px;
        }

        button:hover{
            background: #d81b60;
        }

    </style>

</head>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">

    <h1>🌸 Thêm sản phẩm 🌸</h1>

    <form action="/admin/add"
          method="post"
          enctype="multipart/form-data">

        <label>Tên hoa</label>

        <input type="text"
               name="name"
               required>

        <label>Giá</label>

        <input type="number"
               step="0.01"
               name="price"
               required>
               

        <label>Mô tả</label>

        <textarea name="description"
                  required></textarea>
<label>Giảm giá (%)</label>
<input type="number"
       name="discountPercent"
       min="0"
       max="100"
       th:value="${product != null ? product.discountPercent : 0}">
        <label>Danh mục</label>

        <select name="categoryId" required>

            <option value="">
                -- Chọn danh mục --
            </option>

            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}">
            </option>

        </select>

        <label>Chọn ảnh</label>

        <input type="file"
               name="image"
               accept="image/*"
               required>

        <button type="submit">
            Thêm sản phẩm
        </button>
        <a href="/admin/products">
    <button type="button">
        Quay lại
    </button>
</a>

    </form>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
