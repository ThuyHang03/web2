<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Hồ sơ cá nhân</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    width:700px;
    margin:30px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    color:#ff69b4;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

input,
textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ddd;
    border-radius:5px;
}

button{
    margin-top:20px;
    background:#28a745;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#218838;
}

</style>

</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="container">

    <h1>👤 Hồ sơ cá nhân</h1>

    <form action="/profile/update" method="post">

        <label>Tên đăng nhập</label>

        <input type="text"
               th:value="${user.username}"
               readonly>

        <label>Họ và tên</label>

        <input type="text"
               name="fullName"
               th:value="${user.fullName}">

        <label>Email</label>

        <input type="email"
               name="email"
               th:value="${user.email}">

        <label>Số điện thoại</label>

        <input type="text"
               name="phone"
               th:value="${user.phone}">

        <label>Địa chỉ</label>

        <textarea name="address"
                  rows="4"
                  th:text="${user.address}">
        </textarea>

        <button type="submit">
            Cập nhật thông tin
        </button>

    </form>

</div>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
